<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login Register</title>

        <link rel="stylesheet" href="registration.css">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </head>
    <body>

        <!-- ================= NAVBAR ================= -->
        <header class="main-header1">
            <div class="nav-wrapper">

                <div class="logo-brand">
                    <img src="img/l.jpg" alt="Logo">
                </div>

                <div class="menu-toggle" id="menuToggle">
  <i class="fa fa-bars"></i>
</div>

                <nav>
                    <ul class="nav-links" id="navLinks">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="index.html">About</a></li>
                        <li><a href="index.html">Contact</a></li>
                        <li><a href="registration.html">Login</a></li>
                    </ul>
                </nav>

            </div>
        </header>

        <!-- ================= MAIN CONTENT ================= -->
        <div class="main-content">

            <div class="container">

                <div class="form-section">

                    <!-- LOGIN -->
                    <form class="form login" id="login-link">
                        <h2>Login</h2>

                        <div class="input-box">
                            <input type="text" placeholder="Username" required
                                id="username">
                            <i class="fa fa-user"></i>
                        </div>

                        <div class="input-box">
                            <input type="password" placeholder="Password"
                                required id="password">
                            <i class="fa fa-lock"></i>
                        </div>

                        <button type="submit">Login</button>

                        <p class="switch">
                            Don’t have an account?
                            <span id="showRegister">Register</span>
                        </p>
                    </form>

                    <!-- REGISTER -->
                    <form class="form register" id="registration-link">
                        <h2>Register</h2>

                        <div class="input-box">
                            <input type="text" placeholder="Username" required
                                id="registerUsername">
                            <i class="fa fa-user"></i>
                        </div>

                        <div class="input-box">
                            <input type="email" placeholder="Email" required
                                id="registerEmail">
                            <i class="fa fa-envelope"></i>
                        </div>

                        <div class="input-box">
                            <input type="password" placeholder="Password"
                                required id="registerPassword">
                            <i class="fa fa-lock"></i>
                        </div>

                        <button type="submit">Register</button>

                        <p class="switch">
                            Already have an account?
                            <span id="showLogin">Login</span>
                        </p>

                    </form>

                </div>

                <!-- RIGHT PANEL -->
                <div class="side-panel">
                    <h1>Welcome 👋</h1>
                    <p>Nice to see you again</p>
                </div>

            </div>

        </div>

        <script src="index.js"></script>
    </body>
</html>
